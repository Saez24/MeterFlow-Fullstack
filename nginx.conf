upstream api {
    server api:8000;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip aktivieren für bessere Performance
    gzip on;
    gzip_types text/css application/javascript application/json;

    # Security Headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Chrome Private Network Access
    add_header Access-Control-Allow-Private-Network true;
    add_header Access-Control-Allow-Origin *;

    # FastAPI Backend — same-origin proxy (kein CORS nötig)
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_flags ~ httponly secure samesite=strict;
    }

    location /health {
        proxy_pass http://api/health;
    }

    # Englische Locale (baseHref: /en/)
    location /en/ {
        alias /usr/share/nginx/html/en/;
        try_files $uri $uri/ /en/index.html;
    }

    # Deutsche Locale (baseHref: /) – Angular Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets cachen
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}