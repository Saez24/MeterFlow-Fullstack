services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # Resource-Limits gegen OOM / Noisy-Neighbor (devops-standards.md)
    mem_limit: 512m
    cpus: "1.0"
