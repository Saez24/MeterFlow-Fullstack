name: Build & Publish Docker Image

on:
  push:
    branches: [fullstack]
    tags: ['v*']
  pull_request:
    branches: [fullstack]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: meterflow_test
          POSTGRES_USER: meterflow
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Security scan (pip-audit)
        working-directory: backend
        run: pip-audit --skip-editable

      - name: Run ruff + mypy
        working-directory: backend
        run: |
          ruff check src/
          mypy src/

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://meterflow:testpassword@localhost:5432/meterflow_test
          JWT_SECRET: test_secret_at_least_32_chars_long_here_x
          ENVIRONMENT: development
        run: pytest -v --tb=short

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create environment files
        working-directory: frontend
        run: |
          mkdir -p src/environments
          echo "export const environment = { apiUrl: '/api/v1', production: true };" > src/environments/environment.ts
          echo "export const environment = { apiUrl: '/api/v1', production: false };" > src/environments/environment.development.ts

      - name: Security scan (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: Run tests
        working-directory: frontend
        run: npm test -- --watch=false

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3 # SHA-pinning via: gh api repos/github/codeql-action/git/ref/tags/codeql-bundle-v3.x.x
        if: always()
        with:
          sarif_file: trivy-results.sarif
