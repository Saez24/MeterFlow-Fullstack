<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Ablesungen</h1>
      <p class="page-subtitle">Alle erfassten Zählerstände</p>
    </div>
    <button mat-flat-button color="primary" routerLink="new" class="action-btn">
      <mat-icon>add</mat-icon>
      Ablesung erfassen
    </button>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <mat-form-field appearance="outline" class="filter-select">
      <mat-label>Zähler filtern</mat-label>
      <mat-select [value]="filterMeterId()" (selectionChange)="filterMeterId.set($event.value)">
        <mat-option value="">Alle Zähler</mat-option>
        @for (meter of meters(); track meter.id) {
        <mat-option [value]="meter.id">{{ meter.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  @if (filteredReadings().length === 0) {
  <div class="empty-state">
    <mat-icon>history</mat-icon>
    <h3>Keine Ablesungen gefunden</h3>
    <p>Füge deine erste Ablesung hinzu.</p>
    <button mat-flat-button color="primary" routerLink="new">Ablesung erfassen</button>
  </div>
  }

  <app-readings-list [rows]="filteredReadings()" [showActions]="true" (deleteReading)="deleteReading($event)" />
</div>
