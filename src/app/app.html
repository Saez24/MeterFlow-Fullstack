<div class="app-shell">
  <nav class="sidebar" [class.sidebar--collapsed]="sidebarCollapsed()">
    <div class="sidebar__logo">
      <div class="logo-icon"><mat-icon>electric_bolt</mat-icon></div>
      @if (!sidebarCollapsed()) {
        <span class="logo-text">EnergieMon</span>
      }
    </div>
    <div class="sidebar__nav">
      @for (item of navItems; track item.path) {
        <a
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="nav-item--active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          [matTooltip]="sidebarCollapsed() ? item.label : ''"
          matTooltipPosition="right"
        >
          <mat-icon>{{ item.icon }}</mat-icon>
          @if (!sidebarCollapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </div>
    <div class="sidebar__footer">
      <button
        mat-icon-button
        (click)="themeService.toggle()"
        [matTooltip]="themeService.isDark() ? 'Heller Modus' : 'Dunkler Modus'"
        matTooltipPosition="right"
      >
        <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button
        mat-icon-button
        (click)="sidebarCollapsed.set(!sidebarCollapsed())"
        matTooltipPosition="right"
      >
        <mat-icon>{{ sidebarCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>
  </nav>
  <main class="main-content">
    <header class="mobile-header">
      <div class="mobile-logo"><mat-icon>electric_bolt</mat-icon><span>EnergieMon</span></div>
      <button mat-icon-button (click)="themeService.toggle()">
        <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </header>
    <div class="content-area"><router-outlet></router-outlet></div>
  </main>
  <nav class="bottom-nav">
    @for (item of navItems; track item.path) {
      <a
        class="bottom-nav-item"
        [routerLink]="item.path"
        routerLinkActive="bottom-nav-item--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
